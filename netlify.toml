[build]
  publish = "."

[[redirects]]
  from = "/ksef"
  to = "/ksef/"
  status = 301

[[redirects]]
  from = "/funkcje"
  to = "/funkcje/"
  status = 301

[[redirects]]
  from = "/cennik"
  to = "/cennik/"
  status = 301

[[redirects]]
  from = "/pytania"
  to = "/pytania/"
  status = 301

[[redirects]]
  from = "/kontakt"
  to = "/kontakt/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com; img-src 'self' data:;"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
